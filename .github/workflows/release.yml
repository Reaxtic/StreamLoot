name: Release

# Pushing a version tag (v1.2.3) builds the app, zips it, pulls that version's
# section out of CHANGELOG.md and publishes a GitHub Release with the notes and
# the zip attached — no manual steps. The same zip also feeds the in-app
# auto-updater.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained win-x64)
        run: dotnet publish UI/UI.csproj -c Release -r win-x64 --self-contained true -o "dist/StreamLoot-${{ github.ref_name }}"

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "dist/StreamLoot-${{ github.ref_name }}" -DestinationPath "StreamLoot-${{ github.ref_name }}.zip" -CompressionLevel Optimal

      - name: Extract release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[" + [regex]::Escape($version) + "\].*?(?=^## \[|\z)"
          $m = [regex]::Match($content, $pattern)
          $notes = if ($m.Success) { $m.Value.Trim() } else { "Stream Loot $tag" }
          Set-Content -Path notes.md -Value $notes -Encoding utf8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Deterministic publish: drop any existing release for this tag (e.g. an empty draft left over from a
          # manual attempt or a re-pushed tag) and create a fresh one with the notes and the zip.
          gh release delete "${{ github.ref_name }}" --yes 2>$null
          $global:LASTEXITCODE = 0
          gh release create "${{ github.ref_name }}" "StreamLoot-${{ github.ref_name }}.zip" --title "Stream Loot ${{ github.ref_name }}" --notes-file notes.md
